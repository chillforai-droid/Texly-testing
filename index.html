<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Samsung TV / Tizen viewport fix:
      - "shrink-to-fit=no" prevents Tizen from zooming the layout
      - minimum-scale=1 ensures 1:1 pixel rendering on 1080p TV panels
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1, shrink-to-fit=no"
    />
    <meta name="robots" content="index, follow" />
    <!-- Mobile Web App capable -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Texly" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#2563eb" />

    <!-- IE/Edge compat (no-op on modern but harmless) -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload only 2 critical Inter weights (400+700) for LCP text — not all 6 -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfAZ9hiA.woff2"
      crossorigin
    />

    <!-- Non-blocking font load: media=print trick is more reliable than onload -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      />
    </noscript>

    <!-- Supabase preconnect -->
    <link rel="preconnect" href="https://supabase.co" />
    <link rel="dns-prefetch" href="https://supabase.co" />

    <!-- Third-party DNS prefetch (non-blocking) -->
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.clarity.ms" />

    <!-- OG / SEO -->
    <meta property="og:image" content="https://www.texlyonline.in/og-image.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.texlyonline.in/" />
    <meta property="og:title" content="Texly — 100+ Free Text Tools Online | Instant, No Signup" />
    <meta property="og:description" content="Remove special characters, clean text, convert case, decode URLs — 100+ free tools, no signup, runs in your browser." />
    <meta property="og:site_name" content="Texly" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Texly — 100+ Free Online Text Tools | No Signup" />
    <meta name="twitter:description" content="Remove special characters, clean & format text, decode URLs — 100+ free tools. No signup, 100% private." />
    <meta name="twitter:image" content="https://www.texlyonline.in/og-image.png" />
    <title>Texly — 100+ Free Text Tools Online | No Signup, Instant Results</title>
    <meta
      name="description"
      content="100+ free online text tools — remove special characters, clean text, convert case, decode URLs, format JSON & more. No signup, no download, works on any device. 100% private."
    />
    <meta name="msvalidate.01" content="3A8F5E1C547B7E9EE0D64647DA94E9C9" />
    <meta name="google-site-verification" content="kiMSKVAk4odERvsYcj_9Fo3EXXSPUMEuBwKmuorcsnE" />
    <meta name="google-site-verification" content="qx2ReuXyDGhPkGB-v_-QBS8If5fH0k2N47TfryUJziU" />

    <!-- AdSense: DISABLED until approval
         Approval मिलने के बाद नीचे वाला comment हटाएं और script को uncomment करें
    -->
    <!--

      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5997708513500271"
      crossorigin="anonymous"
    ></script>
    -->

    <!--
      ═══════════════════════════════════════════════════════════════
      CRITICAL: Inline loading indicator
      Shows immediately while JS bundles download – prevents the
      blank white screen that Samsung TV users see on slow networks.
      Pure CSS, zero JS dependencies, removed by main.tsx on mount.
      ═══════════════════════════════════════════════════════════════
    -->
    <!--
      CLS FIX: Inter Fallback font-face with size-adjust
      Arial को Inter की exact metrics से match करता है ताकि font swap
      होने पर कोई layout shift न हो (CLS 0.33 → ~0.0)
    -->
    <style>
      /* Inter v4 exact metrics — measured via fonttools/capsize */
      @font-face {
        font-family: 'Inter Fallback';
        src: local('Arial');
        ascent-override: 90.20%;
        descent-override: 22.48%;
        line-gap-override: 0%;
        size-adjust: 107.40%;
      }
      @font-face {
        font-family: 'Inter Fallback';
        src: local('BlinkMacSystemFont'), local('.AppleSystemUIFont'), local('Helvetica Neue');
        ascent-override: 90.20%;
        descent-override: 22.48%;
        line-gap-override: 0%;
        size-adjust: 107.40%;
      }
    </style>

    <style>
      /* Ensure body is never invisible */
      body { margin: 0; background: #f8fafc; font-family: system-ui, sans-serif; }

      /* Loading overlay – shown until React mounts */
      #texly-boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        transition: opacity 0.4s ease;
      }
      #texly-boot-loader.hide {
        opacity: 0;
        pointer-events: none;
      }
      .texly-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(37,99,235,0.15);
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: texly-boot-spin 0.8s linear infinite;
      }
      .texly-logo-text {
        margin-top: 20px;
        font-size: 24px;
        font-weight: 800;
        color: #2563eb;
        letter-spacing: -0.5px;
      }
      .texly-tagline {
        margin-top: 6px;
        font-size: 13px;
        color: #94a3b8;
      }
      @keyframes texly-boot-spin {
        to { transform: rotate(360deg); }
      }

      /*
        Samsung TV large-screen fixes:
        - Prevent 100vh overflow bug in Tizen 4/5
        - Ensure flex containers don't collapse
      */
      @media (min-width: 1280px) {
        html, body { height: 100%; }
        #root { min-height: 100%; display: flex; flex-direction: column; }
      }

      /*
        TV cursor: Samsung remotes don't have a mouse – hide the cursor
        so the "default arrow" doesn't float on screen.
      */
      @media (hover: none) and (pointer: coarse) {
        * { cursor: default !important; }
      }
    </style>

    <!--
      Deferred analytics – injected after page load to avoid blocking
      the initial render on slow TV / mobile networks.
    -->
    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          // Google Analytics
          var gtm = document.createElement('script');
          gtm.async = true;
          gtm.src = 'https://www.googletagmanager.com/gtag/js?id=G-60WQBHB35M';
          document.head.appendChild(gtm);
          window.dataLayer = window.dataLayer || [];
          function gtag() { dataLayer.push(arguments); }
          gtag('js', new Date());
          gtag('config', 'G-60WQBHB35M');

          // Microsoft Clarity
          (function (c, l, a, r, i, t, y) {
            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments); };
            t = l.createElement(r); t.async = 1;
            t.src = 'https://www.clarity.ms/tag/' + i;
            y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
          })(window, document, 'clarity', 'script', 'w4sr7isiid');
        }, 2000);
      });
    </script>
  </head>
  <body>
    <!--
      Boot loader – pure HTML/CSS, visible immediately.
      Removed by the JS snippet below once React has mounted.
    -->
    <div id="texly-boot-loader" aria-label="Loading Texly" role="status">
      <div class="texly-spinner"></div>
      <div class="texly-logo-text">Texly</div>
      <div class="texly-tagline">Loading tools…</div>
    </div>

    <div id="root"></div>

    <!-- Remove boot loader once React has rendered -->
    <script>
      (function () {
        function hideLoader() {
          var loader = document.getElementById('texly-boot-loader');
          if (!loader) return;
          loader.classList.add('hide');
          setTimeout(function () {
            if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
          }, 450);
        }
        var observer = new MutationObserver(function () {
          var r = document.getElementById('root');
          if (r && r.firstElementChild) { observer.disconnect(); hideLoader(); }
        });
        observer.observe(document.getElementById('root') || document.body, { childList: true, subtree: true });
        // Desktop (≥1024px) gets a shorter failsafe (2s) — fast hardware/network.
        // Mobile keeps 5s for slow networks. Previous value was 5000ms for all.
        var isDesktop = window.innerWidth >= 1024;
        var failsafe = setTimeout(function () { observer.disconnect(); hideLoader(); }, isDesktop ? 2000 : 5000);
        window.addEventListener('load', function () {
          var r = document.getElementById('root');
          if (r && r.firstElementChild) { clearTimeout(failsafe); observer.disconnect(); hideLoader(); }
        });
      })();
    </script>

    <!-- Main app entry (Vite injects both modern + legacy scripts) -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
