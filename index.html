      Samsung TV / Tizen viewport fix:
      - "shrink-to-fit=no" prevents Tizen from zooming the layout
      - minimum-scale=1 ensures 1:1 pixel rendering on 1080p TV panels

      content="width=device-width, initial-scale=1.0, minimum-scale=1, shrink-to-fit=no, viewport-fit=cover"

    <style>body{margin:0;background:#f8fafc;font-family:system-ui,sans-serif}#texly-boot-loader{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8fafc;transition:opacity .4s ease}#texly-boot-loader.hide{opacity:0;pointer-events:none}.texly-spinner{width:48px;height:48px;border:4px solid rgba(37,99,235,.15);border-top-color:#2563eb;border-radius:50%;animation:texly-boot-spin .8s linear infinite}.texly-logo-text{margin-top:20px;font-size:24px;font-weight:800;color:#2563eb;letter-spacing:-.5px}.texly-tagline{margin-top:6px;font-size:13px;color:#94a3b8}@keyframes texly-boot-spin{to{transform:rotate(360deg)}}@media(min-width:1280px){html,body{height:100%}#root{min-height:100%;display:flex;flex-direction:column}}@media(hover:none) and (pointer:coarse){*{cursor:default!important}}</style>

    <script>window.addEventListener('load',function(){setTimeout(function(){var gtm=document.createElement('script');gtm.async=true;gtm.src='https://www.googletagmanager.com/gtag/js?id=G-60WQBHB35M';document.head.appendChild(gtm);window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-60WQBHB35M');(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src='https://www.clarity.ms/tag/'+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y)})(window,document,'clarity','script','w4sr7isiid')},2000)});</script>

    <!--
      Boot loader – pure HTML/CSS, visible immediately.
    -->
    <div id="texly-boot-loader" aria-label="Loading Texly" role="status">
      <div class="texly-spinner"></div>
      <div class="texly-logo-text">Texly</div>
      <div class="texly-tagline">Loading tools…</div>
    </div>

    <div id="root"></div>

    <!-- Remove boot loader once React has rendered -->
    <script>(function(){function hideLoader(){var loader=document.getElementById('texly-boot-loader');if(!loader)return;loader.classList.add('hide');setTimeout(function(){if(loader&&loader.parentNode)loader.parentNode.removeChild(loader)},450)}var observer=new MutationObserver(function(){var r=document.getElementById('root');if(r&&r.firstElementChild){observer.disconnect();hideLoader()}});observer.observe(document.getElementById('root')||document.body,{childList:true,subtree:true});var isDesktop=window.innerWidth>=1024;var failsafe=setTimeout(function(){observer.disconnect();hideLoader()},isDesktop?2000:5000);window.addEventListener('load',function(){var r=document.getElementById('root');if(r&&r.firstElementChild){clearTimeout(failsafe);observer.disconnect();hideLoader()}})})();</script>

    <!-- Main app entry (Vite injects both modern + legacy scripts) -->
    <script type="module" src="/src/main.tsx"></script>
